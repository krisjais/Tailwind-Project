<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">
</head>

<body>
   <div class="bg-black text-pink-500 w-full h-screen">
    <div>
        <h1 class="text-3xl font-bold text-center p-5 tracking-wider">
            This is a Calculator
        </h1>
    </div>
    <div class="bg-purple-600 h-100 w-70 items-center mx-auto rounded-2xl p-5">
        <input type="text" id="result" class="w-full text-black font-medium  h-12 mb-5 text-right text-2xl rounded-lg p-2" disabled>
        <div class="grid grid-cols-4 gap-4">
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('7')">7</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('8')">8</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('9')">9</button>
            <button class="bg-pink-700 text-white p-4 rounded-lg" onclick="setOperation('/')">/</button>

            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('4')">4</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('5')">5</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('6')">6</button>
            <button class="bg-pink-700 text-white p-4 rounded-lg" onclick="setOperation('*')">*</button>

            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('1')">1</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('2')">2</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('3')">3</button>
            <button class="bg-pink-700 text-white p-4 rounded-lg" onclick="setOperation('-')">-</button>

            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="appendNumber('0')">0</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="clearResult()">C</button>
            <button class="bg-pink-500 text-white p-4 rounded-lg" onclick="calculateResult()">=</button>
            <button class="bg-pink-700 text-white p-4 rounded-lg" onclick="setOperation('+')">+</button>

    </div>
   </div>

   <script>
    let currentInput = '';
    let operation = null;
    let previousInput = '';

    function appendNumber(number) {
        currentInput += number;
        document.getElementById('result').value = currentInput;
    }

    function setOperation(op) {
        if (currentInput === '') return;
        if (previousInput !== '') {
            calculateResult();
        }
        operation = op;
        previousInput = currentInput;
        currentInput = '';
    }

    function calculateResult() {
        let result;
        const prev = parseFloat(previousInput);
        const current = parseFloat(currentInput);
        if (isNaN(prev) || isNaN(current)) return;

        switch (operation) {
            case '+':
                result = prev + current;
                break;
            case '-':
                result = prev - current;
                break;
            case '*':
                result = prev * current;
                break;
            case '/':
                result = prev / current;
                break;
            default:
                return;
        }
        currentInput = result.toString();
        operation = null;
        previousInput = '';
        document.getElementById('result').value = currentInput;
    }

    function clearResult() {
        currentInput = '';
        previousInput = '';
        operation = null;
        document.getElementById('result').value = '';
    }

    </script>
</body>

</html>
