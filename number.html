<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./output.css" rel="stylesheet">
</head>
<script defer>
    let count = 0;

    function updateDisplay() {
        document.getElementById("count").innerText = count;
    }

    function increement() {
        count++;
        updateDisplay();
    }
    function decreament() {
        count--;
        updateDisplay();
    }


    function decreament() {
        if (count > 0) {
            count--;
            updateDisplay();
        }
    }

    function reset() {
        count = 0;
        updateDisplay();
    }

</script>

<body class="flex flex-col justify-center items-center h-screen bg-gray-200  text-6xl font-bold">
    <h1 id="count">0</h1>
    <div class="flex flex-col space-y-3">
        <div class="flex items-center space-x-4">
            <button onclick="increement()"
                class="bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition">+</button>
            <button onclick="decreament()"
                class="bg-red-500 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition">-</button>


        </div>
        <div>
            <button onclick="reset()"
                class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition">Reset</button>
        </div>
    </div>

</body>

</html>
