<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Table - Tailwind</title>
  <link href="./output.css" rel="stylesheet">
</head>
<body">

  
  <div class="max-w-6xl mx-auto p-4">

      Student Details

            <th class="px-4 py-3 border border-gray-300 text-left">Name</th>
            <th class="px-4 py-3 border border-gray-300 text-left">Class</th>
            <th class="px-4 py-3 border border-gray-300 text-left">Email</th>
            <th class="px-4 py-3 border border-gray-300 text-left">Phone</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td class="px-4 py-3 border border-gray-300">101</td>
            <td class="px-4 py-3 border border-gray-300">Rahul Sharma</td>
            <td class="px-4 py-3 border border-gray-300">10 A</td>
            <td class="px-4 py-3 border border-gray-300">rahul@gmail.com</td>
            <td class="px-4 py-3 border border-gray-300">9876543210</td>
          </tr>

          <tr>
            <td class="px-4 py-3 border border-gray-300">102</td>
            <td class="px-4 py-3 border border-gray-300">Priya Singh</td>
            <td class="px-4 py-3 border border-gray-300">10 B</td>
            <td class="px-4 py-3 border border-gray-300">priya@gmail.com</td>
            <td class="px-4 py-3 border border-gray-300">9123456789</td>
          </tr>

          <tr>
            <td class="px-4 py-3 border border-gray-300">103</td>
            <td class="px-4 py-3 border border-gray-300">Amit Verma</td>
            <td class="px-4 py-3 border border-gray-300">10 A</td>
            <td class="px-4 py-3 border border-gray-300">amit@gmail.com</td>
            <td class="px-4 py-3 border border-gray-300">9988776655</td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>
<div class="text-center">
  <button class="bg-blue-500  ">
    click me
    </button>
</div>
  

</body>
</html>
